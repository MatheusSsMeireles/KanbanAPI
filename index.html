<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexSec - Documentação de APIs Chatwoot</title>
    
    <!-- Favicon da LexSec -->
    <link rel="icon" href="https://s3storage.lexsec.shop/logos/Logo%20LexSec_Logo.png" type="image/png">
    
    <!-- Tailwind CSS para o Header -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#2563eb',
                            600: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* Ajustes Globais para convivência pacífica entre Tailwind e Scalar */
        body {
            margin: 0;
            padding-top: 72px; /* Espaço exato do Header fixo */
            background-color: #f9fafb;
        }
        
        html.dark body {
            background-color: #111827;
        }

        /* Header Fixo */
        #lexsec-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            z-index: 9999;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        /* Ocultando a barra superior padrão do Scalar para usar a nossa */
        .scalar-api-client-header {
            display: none !important;
        }

        /* Loading Spinner */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 72px);
        }
        .spinner {
            border: 4px solid rgba(37, 99, 235, 0.1);
            border-left-color: #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Tema Customizado pro Scalar focado no Azul da LexSec */
        :root {
            --scalar-color-accent: #2563eb;
            --scalar-button-1: #2563eb;
            --scalar-button-1-hover: #1d4ed8;
        }
        html.dark {
            --scalar-color-accent: #3b82f6;
            --scalar-button-1: #3b82f6;
            --scalar-button-1-hover: #60a5fa;
        }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-200 font-sans transition-colors duration-300">

    <!-- HEADER CUSTOMIZADO LEXSEC -->
    <header id="lexsec-header" class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 transition-colors duration-300">
        <div class="h-full px-4 md:px-6 flex items-center justify-between">
            
            <!-- Logo e Título -->
            <div class="flex items-center space-x-4">
                <div class="bg-white p-1.5 rounded-lg shadow-sm border border-gray-100 hidden sm:block">
                    <img src="https://s3storage.lexsec.shop/logos/Logo%20LexSec_Logo.png" alt="Logo LexSec" class="h-8 object-contain">
                </div>
                
                <!-- Navegação de APIs -->
                <div class="flex space-x-1 bg-gray-100 dark:bg-gray-700 p-1 rounded-lg border border-gray-200 dark:border-gray-600">
                    <button onclick="switchApi('kanban')" id="btn-kanban" class="px-3 py-1.5 text-sm font-medium rounded-md transition-all flex items-center">
                        <i class="fa-solid fa-diagram-project mr-2"></i> Kanban API
                    </button>
                    <button onclick="switchApi('official')" id="btn-official" class="px-3 py-1.5 text-sm font-medium rounded-md transition-all flex items-center text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                        <i class="fa-solid fa-code mr-2"></i> API Oficial
                    </button>
                </div>
            </div>
            
            <!-- Controles Direitos: URL e Tema -->
            <div class="flex items-center space-x-3 md:space-x-4">
                
                <!-- Formulário de URL Customizada -->
                <form id="url-form" class="hidden md:flex items-center space-x-2 relative group">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-link text-gray-400"></i>
                        </div>
                        <input type="url" id="custom-url" placeholder="Opcional: URL da sua instância" 
                            class="pl-10 pr-4 py-1.5 w-64 text-sm bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow"
                            title="Se deixado em branco, utilizaremos a URL oficial do Chatwoot.">
                    </div>
                    <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-1.5 text-sm font-medium rounded-lg transition-colors shadow-sm">
                        Aplicar
                    </button>
                    <!-- Tooltip de explicação -->
                    <div class="absolute top-12 right-0 w-72 bg-gray-800 text-white text-xs rounded-lg p-3 shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
                        <p class="font-bold mb-1"><i class="fa-solid fa-shield-halved text-brand-400"></i> Teste Seguro Client-Side</p>
                        <p class="text-gray-300 leading-relaxed">Insira a URL do seu Chatwoot (ex: https://chat.empresa.com) para testar os endpoints diretamente na sua infraestrutura. Nenhuma credencial sai do seu navegador.</p>
                    </div>
                </form>

                <!-- Botão Mobile para abrir form -->
                <button onclick="document.getElementById('url-form').classList.toggle('hidden');" class="md:hidden p-2 text-gray-500 dark:text-gray-400">
                    <i class="fa-solid fa-link"></i>
                </button>

                <div class="h-6 w-px bg-gray-300 dark:bg-gray-600 hidden md:block"></div>

                <!-- Dark Mode Toggle -->
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors focus:outline-none">
                    <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden"></i>
                    <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- CONTAINER DA DOCUMENTAÇÃO SCALAR -->
    <main id="scalar-container" class="w-full">
        <!-- Loader inicial -->
        <div id="loader" class="loader-container">
            <div class="spinner mb-4"></div>
            <p class="text-gray-500 dark:text-gray-400 font-medium animate-pulse" id="loader-text">Inicializando Motor Scalar...</p>
        </div>
    </main>

    <script>
        // ==========================================
        // 1. DADOS NATIVOS (KANBAN API JSON)
        // ==========================================
        const kanbanSpecData = {
          "openapi": "3.1.0",
          "info": {
            "title": "LexSec | Kanban Extension API",
            "description": "A API Kanban expande as capacidades do Chatwoot permitindo a gestão profissional de Funis de Vendas e Kanban Items.\n\n## Como Começar\n\n1. Clique no botão verde **Authorize** no painel direito (ou insira seu token nas requisições cURL).\n2. Insira o seu `api_access_token` gerado nas configurações de perfil do seu Chatwoot.\n3. Utilize a URL padrão oficial ou configure a URL da sua instância no cabeçalho superior desta página.\n\n## Segurança Absoluta\nOs testes realizados nesta página operam 100% no seu navegador (Client-Side). Seus tokens ou URLs nunca são coletados ou armazenados externamente.",
            "version": "1.0.0"
          },
          "servers": [
            {
              "url": "https://api.chatwoot.com/api/v1",
              "description": "Servidor Chatwoot Oficial"
            }
          ],
          "security": [{"apiAccessToken": []}],
          "components": {
            "securitySchemes": {
              "apiAccessToken": {
                "type": "apiKey",
                "in": "header",
                "name": "api_access_token",
                "description": "Token de acesso do perfil do usuário."
              }
            }
          },
          "tags": [
            {"name": "Funnels", "description": "Gerenciamento de funis de vendas"},
            {"name": "Kanban Items", "description": "Gerenciamento de cards no quadro"},
            {"name": "Checklist", "description": "Tarefas granulares nos cards"},
            {"name": "Scheduled Messages", "description": "Agendamento de disparos de mensagens"}
          ],
          "paths": {
            "/accounts/{account_id}/funnels": {
              "get": {
                "tags": ["Funnels"],
                "summary": "Listar funnels",
                "operationId": "listFunnels",
                "parameters": [
                  {"name": "account_id", "in": "path", "required": true, "schema": {"type": "integer"}, "example": 1}
                ],
                "responses": {
                  "200": {"description": "Sucesso", "content": {"application/json": { "example": [{"id": 1, "name": "Funnel de Vendas", "active": true}] }}}
                }
              },
              "post": {
                "tags": ["Funnels"],
                "summary": "Criar funnel",
                "operationId": "createFunnel",
                "parameters": [
                  {"name": "account_id", "in": "path", "required": true, "schema": {"type": "integer"}, "example": 1}
                ],
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "example": {
                        "funnel": {
                          "name": "Novo Funnel",
                          "description": "Descrição detalhada",
                          "active": true
                        }
                      }
                    }
                  }
                },
                "responses": {"201": {"description": "Criado com sucesso"}}
              }
            },
            "/accounts/{account_id}/kanban_items": {
              "get": {
                "tags": ["Kanban Items"],
                "summary": "Listar kanban items",
                "operationId": "listKanbanItems",
                "parameters": [
                  {"name": "account_id", "in": "path", "required": true, "schema": {"type": "integer"}, "example": 1},
                  {"name": "funnel_id", "in": "query", "required": true, "schema": {"type": "integer"}, "example": 1},
                  {"name": "stage_id", "in": "query", "schema": {"type": "string"}, "example": "lead"}
                ],
                "responses": {"200": {"description": "Sucesso"}}
              },
              "post": {
                "tags": ["Kanban Items"],
                "summary": "Criar kanban item",
                "operationId": "createKanbanItem",
                "parameters": [
                  {"name": "account_id", "in": "path", "required": true, "schema": {"type": "integer"}, "example": 1}
                ],
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "example": {
                        "kanban_item": {
                          "funnel_id": 1,
                          "funnel_stage": "lead",
                          "position": 1,
                          "item_details": {
                            "title": "Novo Lead Comercial",
                            "priority": "high",
                            "value": 1500
                          }
                        }
                      }
                    }
                  }
                },
                "responses": {"201": {"description": "Sucesso"}}
              }
            },
            "/accounts/{account_id}/kanban_items/{id}/change_status": {
              "post": {
                "tags": ["Kanban Items"],
                "summary": "Mudar status do card",
                "operationId": "changeKanbanStatus",
                "parameters": [
                  {"name": "account_id", "in": "path", "required": true, "schema": {"type": "integer"}},
                  {"name": "id", "in": "path", "required": true, "schema": {"type": "integer"}}
                ],
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "example": {"status": "won"}
                    }
                  }
                },
                "responses": {"200": {"description": "Status alterado"}}
              }
            },
            "/accounts/{account_id}/kanban_items/{id}/create_checklist_item": {
              "post": {
                "tags": ["Checklist"],
                "summary": "Criar item no checklist",
                "operationId": "createChecklistItem",
                "parameters": [
                  {"name": "account_id", "in": "path", "required": true, "schema": {"type": "integer"}},
                  {"name": "id", "in": "path", "required": true, "schema": {"type": "integer"}}
                ],
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "example": {"text": "Agendar reunião técnica"}
                    }
                  }
                },
                "responses": {"200": {"description": "Criado com sucesso"}}
              }
            },
            "/accounts/{account_id}/conversations/{conversation_id}/scheduled_messages": {
              "get": {
                "tags": ["Scheduled Messages"],
                "summary": "Listar mensagens agendadas",
                "operationId": "listScheduled",
                "parameters": [
                  {"name": "account_id", "in": "path", "required": true, "schema": {"type": "integer"}},
                  {"name": "conversation_id", "in": "path", "required": true, "schema": {"type": "integer"}}
                ],
                "responses": {"200": {"description": "Sucesso"}}
              },
              "post": {
                "tags": ["Scheduled Messages"],
                "summary": "Criar mensagem agendada",
                "operationId": "createScheduled",
                "parameters": [
                  {"name": "account_id", "in": "path", "required": true, "schema": {"type": "integer"}},
                  {"name": "conversation_id", "in": "path", "required": true, "schema": {"type": "integer"}}
                ],
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "example": {
                        "scheduled_message": {
                          "content": "Olá, passo para lembrar da nossa call!",
                          "scheduled_at": "2025-08-27T13:50:00.000Z",
                          "title": "Lembrete Reunião",
                          "status": "pending"
                        }
                      }
                    }
                  }
                },
                "responses": {"200": {"description": "Mensagem agendada criada"}}
              }
            }
          }
        };

        // ==========================================
        // 2. LÓGICA DE GERENCIAMENTO DE TEMA (DARK MODE)
        // ==========================================
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        function initializeTheme() {
            if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                lightIcon.classList.remove('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                darkIcon.classList.remove('hidden');
            }
        }

        themeToggleBtn.addEventListener('click', function() {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });

        // ==========================================
        // 3. NAVEGAÇÃO ENTRE APIS (URL PARAMS)
        // ==========================================
        // Usamos parâmetros de URL para evitar bugs de re-renderização do Scalar
        const urlParams = new URLSearchParams(window.location.search);
        const currentApi = urlParams.get('api') || 'kanban'; 

        function switchApi(apiName) {
            if (currentApi !== apiName) {
                // Atualiza a URL e recarrega a página de forma limpa
                window.location.search = `?api=${apiName}`;
            }
        }

        // Estiliza os botões ativos do topo
        function updateNavButtons() {
            const btnKanban = document.getElementById('btn-kanban');
            const btnOfficial = document.getElementById('btn-official');
            
            // Reseta cores
            btnKanban.className = "px-3 py-1.5 text-sm font-medium rounded-md transition-all flex items-center text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200";
            btnOfficial.className = "px-3 py-1.5 text-sm font-medium rounded-md transition-all flex items-center text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200";

            // Aplica cor de ativo
            if (currentApi === 'kanban') {
                btnKanban.className = "px-3 py-1.5 text-sm font-medium rounded-md transition-all flex items-center bg-white dark:bg-gray-800 text-brand-600 dark:text-brand-400 shadow-sm border border-gray-200 dark:border-gray-600";
            } else {
                btnOfficial.className = "px-3 py-1.5 text-sm font-medium rounded-md transition-all flex items-center bg-white dark:bg-gray-800 text-brand-600 dark:text-brand-400 shadow-sm border border-gray-200 dark:border-gray-600";
            }
        }

        // ==========================================
        // 4. LÓGICA DE INJEÇÃO DO MOTOR SCALAR
        // ==========================================
        async function renderApiDocumentation() {
            const container = document.getElementById('scalar-container');
            const customUrlInput = document.getElementById('custom-url');
            const loaderText = document.getElementById('loader-text');
            
            // Recupera URL salva pelo usuário (se houver)
            const savedUrl = localStorage.getItem('lexsec_custom_url');
            if (savedUrl) {
                customUrlInput.value = savedUrl;
            }

            let finalSpecData = null;

            if (currentApi === 'kanban') {
                loaderText.innerText = "Carregando Documentação Kanban...";
                // Usa os dados que já embutimos no topo do script
                finalSpecData = JSON.parse(JSON.stringify(kanbanSpecData)); 
            } else {
                loaderText.innerText = "Baixando API Oficial do Repositório Chatwoot...";
                try {
                    // Busca diretamente o Swagger original em tempo real
                    const res = await fetch('https://raw.githubusercontent.com/chatwoot/chatwoot/develop/swagger/swagger.json');
                    if (!res.ok) throw new Error("Falha na rede");
                    finalSpecData = await res.json();
                    
                    // Modifica as descrições em inglês para PT-BR no bloco inicial para dar as boas vindas
                    finalSpecData.info.title = "Chatwoot | API Oficial Base";
                    finalSpecData.info.description = "Esta é a documentação Core do Chatwoot (baixada diretamente da fonte oficial em tempo real).\n\nAqui você encontra todos os endpoints nativos para lidar com Caixas de Entrada (Inboxes), Contatos, Autenticação, Relatórios e Webhooks.";
                } catch (error) {
                    console.error("Erro ao buscar API Oficial:", error);
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-[60vh] text-center px-4">
                            <i class="fa-solid fa-triangle-exclamation text-5xl text-red-500 mb-4"></i>
                            <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">Erro ao carregar API Oficial</h2>
                            <p class="text-gray-600 dark:text-gray-400 max-w-md">Não foi possível conectar ao repositório do Chatwoot para baixar a documentação atualizada. Verifique sua conexão ou tente novamente mais tarde.</p>
                            <button onclick="window.location.reload()" class="mt-6 bg-brand-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-brand-700">Tentar Novamente</button>
                        </div>
                    `;
                    return;
                }
            }

            // APLICAR A URL DO USUÁRIO (se existir e for válida)
            if (savedUrl) {
                const cleanUrl = savedUrl.replace(/\/$/, ''); // Tira barra final
                const fullApiUrl = cleanUrl.includes('/api/v1') ? cleanUrl : `${cleanUrl}/api/v1`;
                
                finalSpecData.servers = [{
                    url: fullApiUrl,
                    description: "Seu Servidor Customizado"
                }];
            }

            // Limpa o Loader
            container.innerHTML = '';

            // CRIA A TAG ESPECIAL DO SCALAR
            // O Scalar lê os dados da API a partir de um script do tipo application/json
            const scriptSpec = document.createElement('script');
            scriptSpec.id = 'api-reference';
            scriptSpec.type = 'application/json';
            
            // Configurações avançadas visuais do Scalar
            const scalarConfig = {
                theme: "default",
                darkMode: document.documentElement.classList.contains('dark'),
                hideModels: false,
                hideDownloadButton: true,
                metaData: {
                    title: "LexSec Explorer"
                }
            };
            
            scriptSpec.dataset.configuration = JSON.stringify(scalarConfig);
            scriptSpec.textContent = JSON.stringify(finalSpecData);
            container.appendChild(scriptSpec);

            // Importa o Motor Scalar Oficial do CDN
            const scriptEngine = document.createElement('script');
            scriptEngine.src = "https://cdn.jsdelivr.net/npm/@scalar/api-reference";
            container.appendChild(scriptEngine);
        }

        // ==========================================
        // 5. INICIALIZAÇÃO E EVENTOS
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            initializeTheme();
            updateNavButtons();
            renderApiDocumentation();

            // Salva URL customizada e recarrega para aplicar ao Scalar instantaneamente
            document.getElementById('url-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const inputUrl = document.getElementById('custom-url').value.trim();
                
                if (inputUrl === "") {
                    localStorage.removeItem('lexsec_custom_url');
                } else {
                    localStorage.setItem('lexsec_custom_url', inputUrl);
                }
                
                // Recarrega a página mantendo a aba atual na URL
                window.location.reload();
            });
            
            // Listener extra para forçar atualização do Scalar caso o usuário mude o tema nativamente (solução para Single Page)
            document.getElementById('theme-toggle').addEventListener('click', () => {
                const isDark = document.documentElement.classList.contains('dark');
                // O Scalar capta a alteração de classe do HTML automaticamente, mas para forçar variáveis CSS caso precise:
                if (isDark) {
                    document.documentElement.style.setProperty('--scalar-color-background-1', '#111827');
                } else {
                    document.documentElement.style.setProperty('--scalar-color-background-1', '#ffffff');
                }
            });
        });
    </script>
</body>
</html>
